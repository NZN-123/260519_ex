<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Sizing</title>
    <style>
      /* 너비, 가로폭 */
      div {
        width: 200px;
        height: 100px;
        border: 5px solid green;
        padding: 20px;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <p>기본 위아래 여백이 있음</p>
    <!-- 기본 박스(Content-Box) -->
    <div>div</div>
  </body>
</html>
