<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block & Inline</title>
    <style>
      div {
        background-color: beige;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
        /* display: block */
      }
      span {
        display: inline;
        background-color: green;
        width: 150px;
        height: 50px;
        /* 가로 마진과 패딩만 적용 됨 */
        margin: 15px;
        padding: 15px;
        /* display: inline */
      }
      .block {
        display: block;
      }
      .inline {
        display: inline;
      }
      .inline-block {
        display: inline-block;
      }
      .container {
        width: 100%;
        height: 100%;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <div>b1</div>
    <div>b2</div>
    <div>b3</div>
    <span>i1</span>
    <span>i2</span>
    <div class="inline">a1</div>
    <span class="block">a2</span>
    <div class="inline-block">a3</div>
    <div class="inline-block">a4</div>
    <img src="https://picsum.photos/100/50" alt="" />
    <img src="https://picsum.photos/100/50" alt="" />
    <div style="visibility: hidden">c1</div>
    <div>c2</div>
    <hr />
    <!-- 마진 충돌 방지 및 의미적으로 감싸는 요소 -container -->
    <div class="container">
      <div class="container">header : 맨 위에 사아트에 대한 설명 등</div>
      <div class="container">nav: 버튼, 링크들이 있는 위치</div>
      <div class="container">
        section / main / article ...: 실제 컨텐츠들이 들어가는 부분
      </div>
      <div class="container">footer: 하단 저작권이나 기타 문구들</div>
    </div>
    <!--  -->
    <section>
      <!-- component/widget: 재사용되며 디자인 / 기능적으로 하나로 묶음인 요소 -->
      <!-- 화면구성/레이아웃: 일반적으로 section -->
      <header>반갑습니다. JIN의 포트폴리오 입니다.</header>
      <nav><button>포트폴리오1</button> 포트폴리오2 포트폴리오3</nav>
      <main>
        <section>...실제 컨텐츠<section>
        <aside>사이드 컨텐츠, 광고</aside>
        <footer>2026 저작권 정의진</footer>
      </main>
    </section>
    <br />
    <br />
    <br />
    <br />
    <br />
    <br />
    <br />
  </body>
</html>
